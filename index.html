<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的日常">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3B82F6">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<title>我的日常</title>
<style>
:root{
  --bg:#F7F7F8;--sf:#FFF;--sf2:#F3F3F5;--sf3:#EBEBED;
  --bd:#E4E4E7;--bd2:#D4D4D8;--bdf:#3B82F6;
  --t1:#18181B;--t2:#52525B;--t3:#A1A1AA;
  --ac:#3B82F6;--acd:#EFF6FF;--acd2:#1D4ED8;
  --gn:#16A34A;--gnd:#F0FDF4;
  --am:#B45309;--amd:#FFFBEB;
  --tl:#0F766E;--tld:#F0FDFA;
  --pu:#7C3AED;--pud:#F5F3FF;
  --rd:#DC2626;--rdd:#FEF2F2;
  --r-s:6px;--r:8px;--r-l:12px;--r-xl:16px;
  --s0:0 1px 2px rgba(0,0,0,.04);
  --s1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --s2:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
  --s3:0 12px 28px rgba(0,0,0,.10),0 4px 8px rgba(0,0,0,.05);
  --e:cubic-bezier(.4,0,.2,1);--ms:150ms;
  --nh:58px;--sw:200px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0F0F11;--sf:#1C1C1F;--sf2:#27272A;--sf3:#3F3F46;
  --bd:#27272A;--bd2:#3F3F46;
  --t1:#FAFAFA;--t2:#A1A1AA;--t3:#52525B;
  --ac:#60A5FA;--acd:#1E3A5F;--acd2:#93C5FD;
  --gn:#4ADE80;--gnd:#14532D;
  --am:#FCD34D;--amd:#451A03;
  --tl:#2DD4BF;--tld:#042F2E;
  --pu:#A78BFA;--pud:#2E1065;
  --rd:#F87171;--rdd:#450A0A;
  --s0:0 1px 2px rgba(0,0,0,.2);
  --s1:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --s2:0 4px 6px rgba(0,0,0,.25),0 2px 4px rgba(0,0,0,.2);
  --s3:0 12px 28px rgba(0,0,0,.4),0 4px 8px rgba(0,0,0,.25);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-font-smoothing:antialiased;height:100%}
::-webkit-scrollbar{display:none}
body{scrollbar-width:none;font-family:system-ui,-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;min-height:100vh;min-height:-webkit-fill-available}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:inherit;-webkit-appearance:none}
textarea{resize:none}
/* iOS safe areas */
.app{display:flex;min-height:100vh;min-height:-webkit-fill-available}
.sidebar{width:var(--sw);flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:9px;padding:22px 18px 18px}
.sb-mark{width:28px;height:28px;background:var(--ac);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.sb-name{font-size:14px;font-weight:600;color:var(--t1)}
.sb-div{height:1px;background:var(--bd);margin:0 18px 8px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;font-weight:500;color:var(--t2);border-left:2px solid transparent;transition:all var(--ms) var(--e);cursor:pointer}
.sb-item:hover{background:var(--sf2);color:var(--t1)}
.sb-item:active{transform:scale(.98)}
.sb-item.active{color:var(--ac);background:var(--acd);border-left-color:var(--ac)}
.sb-item i{font-size:16px}
.sb-sp{flex:1}
.sb-ver{padding:12px 18px;font-size:11px;color:var(--t3)}
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh}
.main-scroll{flex:1;overflow-y:auto;padding:20px 16px 16px}
@media(max-width:860px){
  .sidebar{display:none}
  .main-scroll{padding:16px 14px calc(var(--nh) + env(safe-area-inset-bottom) + 20px)}
}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);z-index:80}
.bn-inner{display:flex;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--t3);transition:color var(--ms) var(--e);cursor:pointer;padding:10px 0;-webkit-tap-highlight-color:transparent}
.bn-item:active{transform:scale(.92)}
.bn-item.active{color:var(--ac)}
.bn-item i{font-size:20px}
.bn-item span{font-weight:500}
@media(max-width:860px){.bottom-nav{display:block}}
.page{display:none}.page.active{display:block}
.pg-title{font-size:21px;font-weight:600;letter-spacing:-.4px;line-height:1.2;margin-bottom:2px}
.pg-sub{font-size:12px;color:var(--t3)}
.pg-hdr{margin-bottom:20px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:15px 17px;margin-bottom:11px;box-shadow:var(--s0)}
.sec-title{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px;display:block}
.row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.active-banner{background:linear-gradient(135deg,var(--acd2) 0%,var(--ac) 100%);border-radius:var(--r-xl);padding:13px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(59,130,246,.25);animation:bannerIn .3s var(--e) both}
@keyframes bannerIn{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
.banner-pulse{width:10px;height:10px;border-radius:50%;background:#fff;flex-shrink:0;animation:pulse 1.6s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.banner-body{flex:1;min-width:0}
.banner-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px}
.banner-task{font-size:14px;font-weight:600;color:#fff;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.banner-time{font-size:12px;color:rgba(255,255,255,.8);margin-top:1px}
.banner-stop{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;transition:background var(--ms) var(--e)}
.banner-stop:hover{background:rgba(255,255,255,.3)}
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stat-c{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-l);padding:11px 6px;text-align:center;box-shadow:var(--s0);transition:border-color var(--ms) var(--e)}
.stat-c:hover{border-color:var(--bd2)}
.stat-n{font-size:18px;font-weight:600;letter-spacing:-.5px;line-height:1}
.stat-l{font-size:10px;color:var(--t3);margin-top:3px;font-weight:500}
.tabs{display:flex;gap:4px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r-l);padding:4px;margin-bottom:18px}
.tab{flex:1;padding:7px 4px;text-align:center;font-size:12px;font-weight:500;border-radius:var(--r);color:var(--t3);transition:all var(--ms) var(--e);white-space:nowrap}
.tab:hover{color:var(--t2)}
.tab.active{background:var(--sf);color:var(--t1);box-shadow:var(--s1)}
.tab:active{transform:scale(.97)}
.filters{display:flex;gap:4px}
.f-btn{padding:3px 10px;border-radius:var(--r-s);font-size:11px;font-weight:500;color:var(--t3);transition:all var(--ms) var(--e)}
.f-btn:hover{background:var(--sf3);color:var(--t2)}
.f-btn.active{background:var(--acd);color:var(--ac)}
.timeline{padding-left:42px;position:relative;min-height:60px}
.timeline::before{content:'';position:absolute;left:13px;top:8px;bottom:8px;width:1px;background:var(--bd)}
.tl-grp{position:relative;margin-bottom:3px}
.tl-hr{position:absolute;left:-42px;width:36px;text-align:right;font-size:10px;color:var(--t3);padding-top:11px;line-height:1}
.tl-e{background:var(--sf);border:1px solid var(--bd);border-left:2.5px solid transparent;border-radius:var(--r-l);padding:9px 10px;margin-bottom:5px;display:flex;align-items:flex-start;gap:8px;position:relative;box-shadow:var(--s0);transition:transform var(--ms) var(--e),box-shadow var(--ms) var(--e),opacity var(--ms) var(--e)}
.tl-e:hover{transform:translateY(-1px);box-shadow:var(--s2)}
.tl-e.removing{opacity:0;transform:translateX(-8px)}
.e-ic{width:27px;height:27px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.e-body{flex:1;min-width:0}
.e-title{font-size:13px;font-weight:500;color:var(--t1);line-height:1.3}
.e-meta{font-size:11px;color:var(--t3);margin-top:2px}
.e-right{display:flex;align-items:flex-start;gap:5px;flex-shrink:0;margin-top:2px}
.e-time{font-size:11px;color:var(--t3)}
.e-del{width:20px;height:20px;border-radius:var(--r-s);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t3);opacity:0;transition:all var(--ms) var(--e)}
.tl-e:hover .e-del{opacity:.4}
.e-del:hover{opacity:1!important;background:var(--rdd);color:var(--rd)}
.done-btn{font-size:15px;color:var(--t3);padding:0 3px 0 0;transition:color var(--ms) var(--e)}
.subtask-list{padding:6px 0 2px 4px;display:flex;flex-direction:column;gap:4px}
.subtask-row{display:flex;align-items:center;gap:7px}
.subtask-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all var(--ms) var(--e)}
.subtask-check.done{background:var(--gn);border-color:var(--gn)}
.subtask-check.done i{color:#fff;font-size:9px;display:block}
.subtask-check i{display:none}
.subtask-text{font-size:12px;color:var(--t2);flex:1}
.subtask-text.done{text-decoration:line-through;color:var(--t3)}
.cal-toggle{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);font-size:12px;font-weight:500;color:var(--t2);transition:all var(--ms) var(--e);margin-top:4px}
.cal-toggle:hover{background:var(--sf2)}
.cal-toggle .chev{font-size:12px;transition:transform var(--ms) var(--e)}
.cal-toggle.open .chev{transform:rotate(180deg)}
.cal-drawer{overflow:hidden;max-height:0;transition:max-height .28s var(--e),margin .28s var(--e)}
.cal-drawer.open{max-height:310px;margin-bottom:14px}
.cal-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:12px;box-shadow:var(--s1)}
.cal-nav{display:flex;align-items:center;margin-bottom:10px}
.cal-mo{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--t1)}
.cal-arr{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd);border-radius:var(--r-s);color:var(--t3);font-size:13px;transition:all var(--ms) var(--e)}
.cal-arr:hover{background:var(--sf2);color:var(--t1)}
.cal-wh{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-wd{text-align:center;font-size:10px;font-weight:500;color:var(--t3);padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--r-s);cursor:pointer;font-size:12px;font-weight:500;color:var(--t1);position:relative;transition:background var(--ms) var(--e)}
.cal-cell:hover{background:var(--sf2)}
.cal-cell.today{background:var(--ac);color:#fff;border-radius:50%}
.cal-cell.oth{color:var(--t3)}
.cal-dots{display:flex;gap:2px;position:absolute;bottom:2px}
.cal-dot{width:3px;height:3px;border-radius:50%}
.cal-detail{overflow:hidden;max-height:0;transition:max-height .25s var(--e)}
.cal-detail.open{max-height:500px;margin-bottom:12px}
.cal-detail-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:13px 15px;box-shadow:var(--s1)}
.cd-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cd-date{font-size:13px;font-weight:600;color:var(--t1)}
.cd-close{width:24px;height:24px;border-radius:var(--r-s);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t3);transition:all var(--ms) var(--e)}
.cd-close:hover{background:var(--sf3);color:var(--t1)}
.timer-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:24px 20px 20px;margin-bottom:11px;box-shadow:var(--s1);text-align:center}
.ring-wrap{position:relative;width:168px;height:168px;margin:0 auto 16px}
.ring-svg{width:168px;height:168px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bd);stroke-width:5}
.ring-prog{fill:none;stroke:var(--ac);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .5s var(--e),stroke var(--ms) var(--e)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.t-num{font-size:36px;font-weight:300;letter-spacing:2px;color:var(--t1);font-variant-numeric:tabular-nums;line-height:1}
.t-mode-lbl{font-size:10px;font-weight:600;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:.6px}
.prog-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:5px}
.prog-bar-wrap{background:var(--sf2);border-radius:var(--r);height:6px;overflow:hidden;margin-bottom:16px}
.prog-bar-fill{height:100%;border-radius:var(--r);transition:width .5s var(--e);background:var(--ac)}
.t-ctrls{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:14px}
.ct-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);border:1px solid var(--bd);background:var(--sf2);transition:all var(--ms) var(--e)}
.ct-btn:hover{background:var(--sf3);color:var(--t1)}
.ct-btn:active{transform:scale(.93)}
.play-btn{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;background:var(--ac);box-shadow:0 4px 14px rgba(59,130,246,.28);transition:all var(--ms) var(--e)}
.play-btn:hover{background:var(--acd2);transform:scale(1.04)}
.play-btn:active{transform:scale(.96)}
.play-btn.paused{background:var(--sf);color:var(--ac);border:1.5px solid var(--ac);box-shadow:none}
.t-status{font-size:12px;color:var(--t3);min-height:18px;transition:color var(--ms) var(--e)}
.t-status.act{color:var(--ac)}
.task-row{display:flex;align-items:center;gap:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r-l);padding:8px 12px;margin-top:13px;text-align:left;transition:border-color var(--ms) var(--e),box-shadow var(--ms) var(--e)}
.task-row:focus-within{border-color:var(--bdf);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.task-row i{font-size:13px;color:var(--t3)}
.task-inp{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--t1)}
.task-inp::placeholder{color:var(--t3)}
.time-row{display:flex;align-items:center;gap:8px;margin-top:8px;text-align:left}
.time-lbl{font-size:12px;color:var(--t3)}
.time-inp{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:5px 10px;font-size:12px;color:var(--t2);outline:none;width:92px;transition:border-color var(--ms) var(--e)}
.time-inp:focus{border-color:var(--bdf)}
.pomo-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.pomo-t{font-size:18px;transition:all .2s var(--e)}
.pomo-t.dim{opacity:.15;filter:grayscale(1)}
.sess-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd)}
.sess-item:last-child{border-bottom:none}
.sess-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sess-task{font-size:13px;font-weight:500;color:var(--t1)}
.sess-range{font-size:11px;color:var(--t3);margin-top:1px}
.sess-min{font-size:12px;font-weight:500;color:var(--ac);flex-shrink:0}
.custom-row{display:none;gap:8px;align-items:center;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-l);padding:10px 12px;margin-bottom:13px}
.custom-row.show{display:flex}
.custom-row label{font-size:12px;color:var(--t3)}
.d-inp{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:6px 9px;font-size:12px;color:var(--t1);outline:none}
.d-inp:focus{border-color:var(--bdf)}
.q-btn{padding:6px 12px;background:var(--ac);color:#fff;border-radius:var(--r);font-size:12px;font-weight:500}
.q-btn:hover{background:var(--acd2)}
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px}
.sum-c{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-l);padding:11px 6px;text-align:center;box-shadow:var(--s0)}
.sum-n{font-size:18px;font-weight:600;letter-spacing:-.5px;line-height:1}
.sum-l{font-size:10px;color:var(--t3);margin-top:3px;font-weight:500}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bc-row{display:flex;align-items:center;gap:9px}
.bc-lbl{font-size:11px;color:var(--t2);width:36px;text-align:right;flex-shrink:0}
.bc-track{flex:1;height:19px;background:var(--sf2);border-radius:var(--r-s);overflow:hidden;position:relative}
.bc-fill{height:100%;border-radius:var(--r-s);display:flex;align-items:center;padding-left:7px;transition:width .5s var(--e)}
.bc-val{font-size:10px;font-weight:600;color:#fff}
.bc-val-out{position:absolute;font-size:10px;font-weight:500;top:50%;right:-2px;translate:100% -50%}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:5px}
.hm-wh{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.hm-wd{text-align:center;font-size:9px;font-weight:500;color:var(--t3)}
.hm-c{aspect-ratio:1;border-radius:3px;background:var(--sf2);transition:transform var(--ms) var(--e)}
.hm-c:hover{transform:scale(1.2)}
.hm-c.l1{background:#BFDBFE}.hm-c.l2{background:#93C5FD}.hm-c.l3{background:#60A5FA}.hm-c.l4{background:#3B82F6}
.hm-leg{display:flex;align-items:center;gap:4px;margin-top:6px;justify-content:flex-end}
.hm-leg span{font-size:10px;color:var(--t3)}
.hm-leg-c{width:10px;height:10px;border-radius:2px}
.share-card{background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 52%,#60A5FA 100%);border-radius:var(--r-xl);padding:19px;margin-bottom:10px;color:#fff;position:relative;overflow:hidden}
.share-card::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.06)}
.sc-p{font-size:10px;opacity:.6;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sc-t{font-size:17px;font-weight:700;margin-bottom:13px;letter-spacing:-.3px}
.sc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px}
.sc-item{background:rgba(255,255,255,.12);border-radius:var(--r-l);padding:10px}
.sc-n{font-size:20px;font-weight:700;letter-spacing:-.4px;line-height:1}
.sc-l{font-size:10px;opacity:.7;margin-top:3px;font-weight:500}
.sc-recent{border-top:1px solid rgba(255,255,255,.15);padding-top:9px}

.share-btn{width:100%;padding:9px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-l);font-size:13px;font-weight:500;color:var(--t2);display:flex;align-items:center;justify-content:center;gap:7px;transition:all var(--ms) var(--e);margin-bottom:11px;box-shadow:var(--s0)}

.input-bar{background:var(--sf);border-top:1px solid var(--bd);padding:9px 13px;padding-bottom:calc(9px + env(safe-area-inset-bottom));position:relative}
.bar-row{display:flex;align-items:flex-end;gap:8px}

.bar-pill:focus-within{border-color:var(--bdf);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.bar-ta{flex:1;background:transparent;border:none;outline:none;font-size:13.5px;color:var(--t1);padding:8px 0;max-height:80px;line-height:1.4}
.bar-ta::placeholder{color:var(--t3)}
.bar-send{width:26px;height:26px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-bottom:5px;opacity:0;pointer-events:none;transition:opacity var(--ms) var(--e)}
.bar-send.show{opacity:1;pointer-events:all}
.bar-send:hover{background:var(--acd2)}
.pm-bd{display:none;position:fixed;inset:0;z-index:10}
.pm-bd.open{display:block}
.pm-menu{position:absolute;bottom:100%;left:13px;width:210px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:6px;box-shadow:var(--s3);z-index:11;opacity:0;transform:translateY(8px) scale(.97);pointer-events:none;transition:opacity var(--ms) var(--e),transform var(--ms) var(--e);transform-origin:bottom left;margin-bottom:6px}
.pm-menu.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.pm-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;transition:background var(--ms) var(--e);font-size:13px;font-weight:500;color:var(--t1)}
.pm-item:hover{background:var(--sf2)}
.pm-item:active{transform:scale(.98)}
.pm-ic{width:30px;height:30px;border-radius:var(--r-s);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:200;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal-sheet{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:480px;padding:17px 19px;padding-bottom:calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;box-shadow:var(--s3);animation:slideUp var(--ms) var(--e) both}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-handle{width:32px;height:3px;border-radius:2px;background:var(--sf3);margin:0 auto 15px}
.m-title{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:15px;letter-spacing:-.2px}
.fg{margin-bottom:12px}
.fl{font-size:12px;font-weight:500;color:var(--t2);display:block;margin-bottom:5px}
.fi{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 11px;font-size:13px;color:var(--t1);outline:none;transition:border-color var(--ms) var(--e),box-shadow var(--ms) var(--e)}
.fi:focus{border-color:var(--bdf);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.fi::placeholder{color:var(--t3)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-actions{display:flex;gap:8px;margin-top:5px}
.btn-cancel{flex:1;padding:9px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);transition:all var(--ms) var(--e)}
.btn-cancel:hover{background:var(--sf3)}
.btn-primary{flex:1;padding:9px;background:var(--ac);border-radius:var(--r);font-size:13px;font-weight:500;color:#fff;transition:background var(--ms) var(--e)}
.btn-primary:hover{background:var(--acd2)}
.m-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}

.preset:hover{background:var(--sf3);border-color:var(--bd2)}
.preset:active{transform:scale(.96)}
.preset-section{margin-top:6px}

.subtask-inputs{display:flex;flex-direction:column;gap:6px;margin-top:5px}
.subtask-fi{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:7px 10px;font-size:12px;color:var(--t1);outline:none;transition:border-color var(--ms) var(--e)}
.subtask-fi:focus{border-color:var(--bdf)}
.subtask-fi::placeholder{color:var(--t3)}
.empty-state{text-align:center;padding:32px 0 24px;color:var(--t3)}
.empty-state i{font-size:26px;display:block;margin-bottom:8px;opacity:.2}
.es-title{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:3px}

/* Install prompt */
.install-bar{background:var(--acd);border:1px solid rgba(59,130,246,.2);border-radius:var(--r-l);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.install-bar-text{flex:1;font-size:13px;color:var(--ac);font-weight:500}

.install-btn{padding:6px 14px;background:var(--ac);color:#fff;border-radius:var(--r);font-size:12px;font-weight:600;transition:background var(--ms) var(--e);flex-shrink:0}
.install-btn:hover{background:var(--acd2)}

</style>
</head>
<body>
<div class="app" id="app">

</aside>
<div class="main-col">
<div class="main-scroll" id="ms">

<!-- HOME -->
<div class="page active" id="pg-home">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px">
    <div><div class="pg-title" id="greeting">今天好</div><div class="pg-sub" id="subdate"></div></div>
    <button class="cal-toggle" id="cal-btn" onclick="toggleCal()"><i class="ti ti-calendar"></i>日历<i class="ti ti-chevron-down chev" id="cal-chev"></i></button>
  </div>

  <div class="cal-drawer" id="cal-drawer">
    <div class="cal-card">
      <div class="cal-nav"><button class="cal-arr" onclick="calMv(-1)"><i class="ti ti-chevron-left"></i></button><span class="cal-mo" id="cal-mo"></span><button class="cal-arr" onclick="calMv(1)"><i class="ti ti-chevron-right"></i></button></div>
      <div class="cal-wh"><div class="cal-wd">日</div><div class="cal-wd">一</div><div class="cal-wd">二</div><div class="cal-wd">三</div><div class="cal-wd">四</div><div class="cal-wd">五</div><div class="cal-wd">六</div></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>
  <div class="cal-detail" id="cal-detail">
    <div class="cal-detail-card"><div class="cd-hdr"><span class="cd-date" id="cd-lbl"></span><button class="cd-close" onclick="closeCalDetail()"><i class="ti ti-x"></i></button></div><div id="cd-list"></div></div>
  </div>
  <div class="stats-strip">
    <div class="stat-c"><div class="stat-n" id="ss-f" style="color:var(--ac)">0</div><div class="stat-l">专注min</div></div>
    <div class="stat-c"><div class="stat-n" id="ss-d" style="color:var(--gn)">0</div><div class="stat-l">完成项</div></div>
    <div class="stat-c"><div class="stat-n" id="ss-m" style="color:var(--am)">0</div><div class="stat-l">餐次</div></div>
    <div class="stat-c"><div class="stat-n" id="ss-e" style="color:var(--tl)">0</div><div class="stat-l">运动min</div></div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span class="sec-title" style="margin:0">时间流</span>
    <div class="filters"><button class="f-btn active" onclick="setTlF('all',this)">全部</button><button class="f-btn" onclick="setTlF('food',this)">饮食</button><button class="f-btn" onclick="setTlF('exercise',this)">运动</button></div>
  </div>
  <div class="timeline" id="timeline"></div>
</div>

<!-- FOCUS -->
<div class="page" id="pg-focus">
  <div class="pg-hdr"><div class="pg-title">专注计时</div><div class="pg-sub">完成后自动写入时间流</div></div>
  <div class="tabs"><button class="tab active" id="mt-pomo" onclick="setMode('pomo')">🍅 25'</button><button class="tab" id="mt-short" onclick="setMode('short')">休息 5'</button><button class="tab" id="mt-long" onclick="setMode('long')">长休 15'</button><button class="tab" id="mt-free" onclick="setMode('free')">自由</button></div>
  <div class="timer-card">
    <div class="ring-wrap"><svg class="ring-svg" viewBox="0 0 168 168"><circle class="ring-bg" cx="84" cy="84" r="74"/><circle class="ring-prog" id="ring" cx="84" cy="84" r="74" stroke-dasharray="464.96" stroke-dashoffset="0"/></svg><div class="ring-center"><div class="t-num" id="t-num">25:00</div><div class="t-mode-lbl" id="t-lbl">FOCUS</div></div></div>
    <div class="prog-bar-label"><span id="pb-e">0 min</span><span id="pb-t">25 min</span></div>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="t-ctrls"><button class="ct-btn" onclick="resetTimer()"><i class="ti ti-refresh"></i></button><button class="play-btn" id="play-btn" onclick="toggleTimer()"><i class="ti ti-player-play" id="play-ic"></i></button><button class="ct-btn" onclick="skipTimer()"><i class="ti ti-player-skip-forward"></i></button></div>
    <div class="t-status" id="t-status">点击开始专注</div>
    <div class="task-row"><i class="ti ti-pencil"></i><input class="task-inp" id="task-inp" placeholder="正在专注于…（选填）"></div>
    <div class="time-row"><span class="time-lbl">开始时间</span><input type="time" class="time-inp" id="fstart"></div>
  </div>
  <div class="card"><div class="row-hdr"><span class="sec-title" style="margin:0">今日番茄</span><span style="font-size:12px;color:var(--t3)" id="pomo-lbl">0 个</span></div><div class="pomo-row" id="pomo-row"></div></div>
  <div class="card"><span class="sec-title">今日专注记录</span><div id="sess-list"></div></div>
</div>

<!-- STATS -->
<div class="page" id="pg-stats">
  <div class="pg-hdr"><div class="pg-title">统计</div><div class="pg-sub" id="st-desc">今日数据</div></div>
  <div class="tabs"><button class="tab active" id="pt-day" onclick="setPeriod('day')">今日</button><button class="tab" id="pt-week" onclick="setPeriod('week')">本周</button><button class="tab" id="pt-month" onclick="setPeriod('month')">本月</button><button class="tab" id="pt-custom" onclick="setPeriod('custom')">自定义</button></div>
  <div class="custom-row" id="custom-row"><label>从</label><input type="date" class="d-inp" id="ds"><label>到</label><input type="date" class="d-inp" id="de"><button class="q-btn" onclick="renderStatsPage()">查询</button></div>
  <div class="sum-row"><div class="sum-c"><div class="sum-n" id="su-f" style="color:var(--ac)">0</div><div class="sum-l">专注min</div></div><div class="sum-c"><div class="sum-n" id="su-d" style="color:var(--gn)">0</div><div class="sum-l">完成项</div></div><div class="sum-c"><div class="sum-n" id="su-m" style="color:var(--am)">0</div><div class="sum-l">餐次</div></div><div class="sum-c"><div class="sum-n" id="su-e" style="color:var(--tl)">0</div><div class="sum-l">运动min</div></div></div>
  <div class="share-card"><div class="sc-p" id="sc-p">今日</div><div class="sc-t">完成统计 ✦</div><div class="sc-grid" id="sc-grid"></div><div class="sc-recent" id="sc-recent"></div></div>
  <button class="share-btn" onclick="shareHint()"><i class="ti ti-share"></i>截图分享</button>
  <div class="card"><div class="row-hdr"><span class="sec-title" style="margin:0">专注时长</span><span style="font-size:11px;color:var(--t3)" id="fc-lbl"></span></div><div class="bar-chart" id="fc"></div></div>
  <div class="card"><div class="row-hdr"><span class="sec-title" style="margin:0">运动时长</span><span style="font-size:11px;color:var(--t3)" id="ec-lbl"></span></div><div class="bar-chart" id="ec"></div></div>
  <div class="card"><div class="row-hdr"><span class="sec-title" style="margin:0">热力图</span><span style="font-size:11px;color:var(--t3)">近28天</span></div><div class="hm-wh"><div class="hm-wd">日</div><div class="hm-wd">一</div><div class="hm-wd">二</div><div class="hm-wd">三</div><div class="hm-wd">四</div><div class="hm-wd">五</div><div class="hm-wd">六</div></div><div class="heatmap" id="heatmap"></div><div class="hm-leg"><span>少</span><div class="hm-leg-c" style="background:var(--sf2)"></div><div class="hm-leg-c" style="background:#BFDBFE"></div><div class="hm-leg-c" style="background:#93C5FD"></div><div class="hm-leg-c" style="background:#60A5FA"></div><div class="hm-leg-c" style="background:#3B82F6"></div><span>多</span></div></div>
  <div class="card"><div class="row-hdr"><span class="sec-title" style="margin:0">全部事项</span><span style="font-size:11px;color:var(--t3)" id="ai-lbl"></span></div><div id="all-items"></div></div>
  <div class="card"><span class="sec-title">数据管理</span>
    <div style="display:flex;gap:8px">
      <button class="btn-cancel" style="flex:1;padding:9px;font-size:12px" onclick="exportData()"><i class="ti ti-download" style="margin-right:5px"></i>导出备份</button>
      <label class="btn-cancel" style="flex:1;padding:9px;font-size:12px;text-align:center;cursor:pointer"><i class="ti ti-upload" style="margin-right:5px"></i>恢复数据<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
    </div>
  </div>

</div>
<div class="input-bar" id="input-bar">
  <div class="pm-bd" id="pm-bd" onclick="closePM()"></div>
  <div class="pm-menu" id="pm-menu">
    <div class="pm-item" onclick="openModal('food')"><div class="pm-ic" style="background:var(--amd);color:var(--am)"><i class="ti ti-salad"></i></div>记饮食</div>
    <div class="pm-item" onclick="openModal('exercise')"><div class="pm-ic" style="background:var(--tld);color:var(--tl)"><i class="ti ti-run"></i></div>记运动</div>
    <div class="pm-item" onclick="openModal('sched')"><div class="pm-ic" style="background:var(--acd);color:var(--ac)"><i class="ti ti-calendar-plus"></i></div>添加日程</div>
  </div>
  <div class="bar-row">
    <button class="bar-plus" id="bar-plus" onclick="togglePM()"><i class="ti ti-plus" id="plus-ic"></i></button>
    <div class="bar-pill"><textarea class="bar-ta" id="bar-ta" rows="1" placeholder="随手记…" oninput="onBarInput()" onkeydown="onBarKey(event)"></textarea><button class="bar-send" id="bar-send" onclick="submitLog()"><i class="ti ti-arrow-up"></i></button></div>
  </div>
</div>
</div>
<nav class="bottom-nav"><div class="bn-inner">
  <div class="bn-item active" onclick="goPage('home',this)"><i class="ti ti-home"></i><span>今日</span></div>
  <div class="bn-item" onclick="goPage('focus',this)"><i class="ti ti-clock"></i><span>专注</span></div>

</div></nav>
</div>
</div>

<!-- UNIFIED MODAL -->
<div class="modal-ov" id="modal-ov" onclick="bgClose(event)">

    <div class="m-handle"></div>
    <div class="m-title" id="m-title"></div>
    <div id="m-body"></div>
    <div class="m-actions"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-primary" id="m-save-btn">保存</button></div>
  </div>
</div>

<script>
/* ══ STATE ══ */
let D={ents:[],scheds:[],focusSessions:[]};
let tlF='all',calOpen=false,mcDate=new Date(),pmOpen=false;
let cMeal='早餐',cInt='轻松',cEvType='task',statPeriod='day';
let tMode='pomo',tSec=1500,tOrig=1500,tRun=false,tInt=null;
let curPage='home',curModal=null;
let deferredPrompt=null;
const CIRC=2*Math.PI*74;
const MODES={pomo:1500,short:300,long:900,free:0};
const MODE_LBL={pomo:'FOCUS',short:'BREAK',long:'LONG BREAK',free:'FREE'};
const PAGES=['home','focus','stats'];
const TC={log:{l:'随手记',c:'var(--pu)',bg:'var(--pud)',ic:'ti-pencil'},food:{l:'饮食',c:'var(--am)',bg:'var(--amd)',ic:'ti-salad'},exercise:{l:'运动',c:'var(--tl)',bg:'var(--tld)',ic:'ti-run'},focus:{l:'专注',c:'var(--ac)',bg:'var(--acd)',ic:'ti-clock'},task:{l:'任务',c:'var(--gn)',bg:'var(--gnd)',ic:'ti-check'},study:{l:'学习',c:'var(--ac)',bg:'var(--acd)',ic:'ti-book'}};
const FOOD_PRESETS={早餐:['燕麦粥','全麦吐司','鸡蛋','牛奶','豆浆','水果'],午餐:['米饭+菜','外卖','沙拉','面条','便当'],晚餐:['轻食','米饭+菜','汤','面'],加餐:['坚果','酸奶','水果','饼干']};
const EXER_PRESETS=['散步20min','跑步30min','HIIT20min','瑜伽30min','骑车30min','游泳','力量训练'];
const TODAY=()=>new Date().toISOString().slice(0,10);
const pad=n=>String(n).padStart(2,'0');
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ntime=()=>{const n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes());};
const fmtDay=d=>{if(!d)return'';if(d===TODAY())return'今天';const dif=Math.round((new Date(d+' 00:00')-new Date(TODAY()+' 00:00'))/86400000);return dif===1?'明天':dif===-1?'昨天':d.slice(5).replace('-','/')};

/* ══ STORAGE (localStorage for PWA) ══ */
function loadData(){try{const r=localStorage.getItem('daily-v6');if(r)D=JSON.parse(r);}catch(e){}if(!D.focusSessions)D.focusSessions=[];if(!D.scheds)D.scheds=[];}
function saveData(){try{localStorage.setItem('daily-v6',JSON.stringify(D));}catch(e){}}

/* ══ PWA INSTALL ══ */
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-prompt').innerHTML=`<div class="install-bar">

function renderHomeStats(){
  const t=TODAY();

  const dn=D.ents.filter(e=>e.date===t&&e.type==='log').length+D.scheds.filter(s=>s.date===t&&s.done).length;
  const ml=D.ents.filter(e=>e.date===t&&e.type==='food').length;
  const ex=D.ents.filter(e=>e.date===t&&e.type==='exercise').reduce((a,e)=>a+(parseInt(e.dur)||0),0);
  [['ss-f',fm],['ss-d',dn],['ss-m',ml],['ss-e',ex]].forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.textContent=v;});

function renderTimeline(){
  const t=TODAY();
  let items=[...D.ents.filter(e=>e.date===t),...D.scheds.filter(s=>s.date===t).map(s=>({...s,_s:true}))];
  if(tlF==='food')items=items.filter(i=>i.type==='food');
  if(tlF==='exercise')items=items.filter(i=>i.type==='exercise');
  items.sort((a,b)=>(a.time||'00:00')<=(b.time||'00:00')?-1:1);
  const el=document.getElementById('timeline');
  if(!items.length){el.innerHTML=`<div class="empty-state"><i class="ti ti-sun-low"></i><div class="es-title">今天还没有记录</div><div class="es-sub">从底部输入框开始<br>记下你做的第一件事</div></div>`;return;}
  const grps={};
  items.forEach(i=>{const h=(i.time||'--').split(':')[0];if(!grps[h])grps[h]=[];grps[h].push(i);});
  let html='';
  Object.keys(grps).sort().forEach(h=>{
    html+=`<div class="tl-grp">`;
    if(h!=='--')html+=`<div class="tl-hr">${h}:00</div>`;
    grps[h].forEach(item=>{
      const tc=TC[item.type]||TC.log;const done=item._s&&item.done;
      let meta='';
      if(item.type==='food')meta=(item.meal||'')+(item.cal?` · ${item.cal} kcal`:'');
      else if(item.type==='exercise')meta=`${item.dur||0}分钟${item.intensity?' · '+item.intensity:''}`;
      else if(item.type==='focus')meta=`${item.min||0}分钟${item.endTime?` (${item.time}–${item.endTime})`:''}`;
      else if(item._s&&item.note)meta=item.note;
      let subtasksHtml='';
      if(item._s&&item.subtasks&&item.subtasks.length){subtasksHtml=`<div class="subtask-list">${item.subtasks.map((st,si)=>`<div class="subtask-row"><div class="subtask-check${st.done?' done':''}" onclick="togSubtask(${item.id},${si})"><i class="ti ti-check"></i></div><span class="subtask-text${st.done?' done':''}">${esc(st.text)}</span></div>`).join('')}</div>`;}
      const chk=item._s?`<button class="done-btn" onclick="togDone(${item.id})" style="color:${done?'var(--gn)':'var(--t3)'}"><i class="ti ti-${done?'circle-check':'circle'}"></i></button>`:'';
      const del=item._s?`<button class="e-del" onclick="delItem('sched',${item.id})"><i class="ti ti-x"></i></button>`:`<button class="e-del" onclick="delItem('ent',${item.id})"><i class="ti ti-x"></i></button>`;
      html+=`<div class="tl-e" id="tl-e-${item.id}" style="border-left-color:${tc.c};${done?'opacity:.45':''}"><div class="e-ic" style="background:${tc.bg};color:${tc.c}"><i class="ti ${tc.ic}"></i></div><div class="e-body"><div class="e-title" style="${done?'text-decoration:line-through;color:var(--t3)':''}">${esc(item.text||item.title||'')}</div>${meta?`<div class="e-meta">${esc(meta)}</div>`:''}${subtasksHtml}</div><div class="e-right">${chk}<span class="e-time">${item.time||''}</span>${del}</div></div>`;
    });
    html+=`</div>`;
  });
  el.innerHTML=html;
}

  const fill=document.getElementById('prog-fill');const pe=document.getElementById('pb-e');const pt=document.getElementById('pb-t');

function renderSessions(){const t=TODAY(),ss=[...D.focusSessions.filter(s=>s.date===t)].reverse();const el=document.getElementById('sess-list');if(!ss.length){el.innerHTML=`<div class="empty-state" style="padding:16px 0"><i class="ti ti-clock-off"></i><div class="es-sub">今日还没有专注记录</div></div>`;return;}el.innerHTML=ss.map(s=>`<div class="sess-item"><div class="sess-dot" style="background:${s.isPomo?'var(--ac)':'var(--tl)'}"></div><div style="flex:1"><div class="sess-task">${esc(s.task)}</div><div class="sess-range">${s.startT}–${s.endT}</div></div><div class="sess-min">${s.minutes} min</div></div>`).join('');}
function setPeriod(p){statPeriod=p;['day','week','month','custom'].forEach(x=>document.getElementById('pt-'+x).classList.toggle('active',x===p));document.getElementById('custom-row').classList.toggle('show',p==='custom');if(p!=='custom')renderStatsPage();}
function getRange(){const t=new Date(),ts=TODAY();if(statPeriod==='day')return{s:ts,e:ts};if(statPeriod==='week'){const ws=new Date(t.getTime()-t.getDay()*86400000);return{s:ws.toISOString().slice(0,10),e:new Date(ws.getTime()+6*86400000).toISOString().slice(0,10)};}if(statPeriod==='month')return{s:`${t.getFullYear()}-${pad(t.getMonth()+1)}-01`,e:ts};return{s:document.getElementById('ds').value||ts,e:document.getElementById('de').value||ts};}
function daysInRange(s,e){const ds=[],st=new Date(s+' 00:00'),en=new Date(e+' 00:00');while(st<=en){ds.push(st.toISOString().slice(0,10));st.setDate(st.getDate()+1);}return ds;}
function renderStatsPage(){
  const{s,e}=getRange();const days=daysInRange(s,e);
  const tF=days.reduce((a,d)=>a+D.ents.filter(x=>x.date===d&&x.type==='focus').reduce((b,x)=>b+(x.min||0),0),0);
  const tD=days.reduce((a,d)=>a+D.ents.filter(x=>x.date===d&&x.type==='log').length+D.scheds.filter(x=>x.date===d&&x.done).length,0);
  const tM=days.reduce((a,d)=>a+D.ents.filter(x=>x.date===d&&x.type==='food').length,0);
  const tE=days.reduce((a,d)=>a+D.ents.filter(x=>x.date===d&&x.type==='exercise').reduce((b,x)=>b+(parseInt(x.dur)||0),0),0);
  [['su-f',tF],['su-d',tD],['su-m',tM],['su-e',tE]].forEach(([id,v])=>document.getElementById(id).textContent=v);
  document.getElementById('st-desc').textContent=s===e?s:s+' → '+e;
  const pL={day:'今日',week:'本周',month:'本月',custom:'自定义'}[statPeriod];
  document.getElementById('sc-p').textContent=pL;
  document.getElementById('sc-grid').innerHTML=`<div class="sc-item"><div class="sc-n">${tF}</div><div class="sc-l">专注分钟</div></div><div class="sc-item"><div class="sc-n">${tD}</div><div class="sc-l">完成事项</div></div><div class="sc-item"><div class="sc-n">${tM}</div><div class="sc-l">饮食记录</div></div><div class="sc-item"><div class="sc-n">${tE}</div><div class="sc-l">运动分钟</div></div>`;
  const rec=[...D.ents.filter(x=>days.includes(x.date)&&x.type==='log'),...D.scheds.filter(x=>days.includes(x.date)&&x.done)].sort((a,b)=>((b.date||'')+(b.time||''))<((a.date||'')+(a.time||''))?1:-1).slice(0,4);
  document.getElementById('sc-recent').innerHTML=rec.length?`<div class="sc-rt">最近完成</div>${rec.map(i=>`<div class="sc-ri"><div class="sc-rd"></div><span>${esc(i.text||i.title||'')}</span></div>`).join('')}`:'';
  const cd=days.slice(-7);
  renderBars('fc',cd,d=>D.ents.filter(x=>x.date===d&&x.type==='focus').reduce((a,x)=>a+(x.min||0),0),'#3B82F6');
  renderBars('ec',cd,d=>D.ents.filter(x=>x.date===d&&x.type==='exercise').reduce((a,x)=>a+(parseInt(x.dur)||0),0),'#0F766E');
  document.getElementById('fc-lbl').textContent=`共 ${tF} 分钟`;document.getElementById('ec-lbl').textContent=`共 ${tE} 分钟`;
  renderHeatmap();renderAllItems(days);
}
function renderBars(id,days,vFn,color){const vals=days.map(d=>vFn(d)),maxV=Math.max(...vals,1);const el=document.getElementById(id);if(vals.every(v=>v===0)){el.innerHTML=`<div class="empty-state" style="padding:12px 0"><i class="ti ti-chart-bar"></i><div class="es-sub">暂无数据</div></div>`;return;}el.innerHTML=days.map((d,i)=>{const v=vals[i],pct=Math.round(v/maxV*100),lbl=d.slice(5).replace('-','/');return`<div class="bc-row"><div class="bc-lbl">${lbl}</div><div class="bc-track"><div class="bc-fill" style="width:${pct}%;background:${color}">${pct>22&&v>0?`<span class="bc-val">${v}</span>`:''}</div>${pct<=22&&v>0?`<span class="bc-val-out" style="color:${color}">${v}</span>`:''}</div></div>`;}).join('');}
function renderHeatmap(){const now=new Date();let html='';for(let i=27;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const c=D.ents.filter(x=>x.date===ds).length+D.scheds.filter(x=>x.date===ds&&x.done).length;const lv=c===0?'':c<=1?'l1':c<=3?'l2':c<=6?'l3':'l4';html+=`<div class="hm-c ${lv}" title="${ds}: ${c}"></div>`;}document.getElementById('heatmap').innerHTML=html;}
function renderAllItems(days){const all=[...D.ents.filter(x=>days.includes(x.date)),...D.scheds.filter(x=>days.includes(x.date))].sort((a,b)=>((b.date||'')+(b.time||''))<((a.date||'')+(a.time||''))?1:-1).slice(0,40);document.getElementById('ai-lbl').textContent=`共 ${all.length} 条`;const el=document.getElementById('all-items');if(!all.length){el.innerHTML=`<div class="empty-state" style="padding:16px 0"><i class="ti ti-list"></i><div class="es-sub">暂无数据</div></div>`;return;}el.innerHTML=all.map(item=>{const tc=TC[item.type]||TC.log;return`<div class="all-item"><div class="ai-dot" style="background:${tc.c}"></div><div class="ai-text">${esc(item.text||item.title||'')}</div><span class="ai-badge" style="background:${tc.bg};color:${tc.c}">${tc.l}</span><span class="ai-date">${item.date||''}</span></div>`;}).join('');}
function shareHint(){if(navigator.share){navigator.share({title:'我的日常 · 完成统计',text:'今日专注、饮食、运动数据'}).catch(()=>{});}else{alert('截图方式：\niOS：侧边键+音量键\n安卓：电源键+音量键\nPC：Snipping Tool\n\n截蓝色卡片即可 ✦');}}
function exportData(){const json=JSON.stringify(D,null,2);const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`daily-backup-${TODAY()}.json`;a.click();URL.revokeObjectURL(url);}
function importData(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const parsed=JSON.parse(e.target.result);if(parsed.ents||parsed.scheds){if(confirm('确定用备份数据覆盖当前所有数据？')){D={ents:[],scheds:[],focusSessions:[],...parsed};saveData();updateAll();alert('数据恢复成功 ✓');}}else{alert('文件格式不正确');}}catch{alert('解析失败，请检查文件');}};reader.readAsText(file);input.value='';}
function goPage(name){
  curPage=name;PAGES.forEach(p=>document.getElementById('pg-'+p).classList.remove('active'));document.getElementById('pg-'+name).classList.add('active');
  document.querySelectorAll('.sb-item').forEach((s,i)=>s.classList.toggle('active',PAGES[i]===name));
  document.querySelectorAll('.bn-item').forEach((b,i)=>b.classList.toggle('active',PAGES[i]===name));
  document.getElementById('input-bar').style.display=name==='home'?'block':'none';
  document.getElementById('ms').scrollTop=0;updateAll();
}
updTimer();init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('PWA Service Worker 注册成功 ✓'))
      .catch(err => console.log('PWA 注册失败 ✗', err));
  });
}
